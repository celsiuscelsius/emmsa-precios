name: Scraper EMMSA Diario
on:
  repository_dispatch:
    types: [cron-job-trigger]
  schedule:
    - cron: '0 7 * * *'     # 02:00 AM Lima (UTC-5)
    - cron: '30 7 * * *'    # 02:30 AM Lima
    - cron: '0 8 * * *'     # 03:00 AM Lima
    - cron: '30 8 * * *'    # 03:30 AM Lima
    - cron: '0 9 * * *'     # 04:00 AM Lima
    - cron: '30 9 * * *'    # 04:30 AM Lima
    - cron: '0 10 * * *'    # 05:00 AM Lima
    - cron: '30 10 * * *'   # 05:30 AM Lima
    - cron: '0 11 * * *'    # 06:00 AM Lima
    - cron: '30 11 * * *'   # 06:30 AM Lima
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  ejecutar-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4
    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium
    - name: Ejecutar el scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        GITHUB_ACTIONS: "true"
      run: python scraper.py
