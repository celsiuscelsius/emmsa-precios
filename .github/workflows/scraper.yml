name: Scraper EMMSA Diario

on:
  schedule:
    - cron: '0 10 * * 1-6'   # 05:00 AM Lima
    - cron: '0 11 * * 1-6'   # 06:00 AM Lima
    - cron: '0 12 * * 1-6'   # 07:00 AM Lima
    - cron: '0 13 * * 1-6'   # 08:00 AM Lima
    - cron: '0 14 * * 1-6'   # 09:00 AM Lima
    - cron: '0 15 * * 1-6'   # 10:00 AM Lima
    - cron: '0 17 * * 1-6'   # 12:00 PM Lima
    - cron: '0 21 * * 1-6'   # 04:00 PM Lima
    - cron: '0 1  * * 2-0'   # 08:00 PM Lima
  workflow_dispatch:

jobs:
  ejecutar-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: 🚀 Ejecutar el scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python scraper.py
