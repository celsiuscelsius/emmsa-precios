name: Scraper EMMSA Diario

on:
  schedule:
    - cron: '15 14 * * *'   # 09:15 AM Lima (UTC-5)
    - cron: '25 14 * * *'   # 09:25 AM Lima
    - cron: '35 14 * * *'   # 09:35 AM Lima
    - cron: '0 13 * * *'    # 08:00 AM Lima (producción)
    - cron: '0 14 * * *'    # 09:00 AM Lima (producción)
    - cron: '0 15 * * *'    # 10:00 AM Lima (producción)
    - cron: '0 16 * * *'    # 11:00 AM Lima (producción)
    - cron: '0 17 * * *'    # 12:00 PM Lima (producción)
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ejecutar-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: Ejecutar el scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        GITHUB_ACTIONS: "true"
      run: python scraper.py
