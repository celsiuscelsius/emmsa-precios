name: Scraper EMMSA Diario

on:
  schedule:
    - cron: '0 15  * * 0-6'   # 10:00 AM Lima - PRUEBA HOY
    - cron: '20 15 * * 0-6'   # 10:20 AM Lima - PRUEBA HOY
    - cron: '40 15 * * 0-6'   # 10:40 AM Lima - PRUEBA HOY
    - cron: '0 13 * * 0-6'    # 08:00 AM Lima (producción)
    - cron: '0 14 * * 0-6'    # 09:00 AM Lima (producción)
    - cron: '0 15 * * 0-6'    # 10:00 AM Lima (producción)
    - cron: '0 16 * * 0-6'    # 11:00 AM Lima (producción)
    - cron: '0 17 * * 0-6'    # 12:00 PM Lima (producción)
  workflow_dispatch:

jobs:
  ejecutar-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: 🚀 Ejecutar el scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python scraper.py
