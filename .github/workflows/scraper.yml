name: Scraper EMMSA Diario

on:
  schedule:
    # LUNES A SÁBADO — Bloque intensivo cada 30 min (Mañana)
    - cron: '30 10 * * 1-6'   # 05:30 AM Lima (UTC 10:30)
    - cron: '0 11 * * 1-6'    # 06:00 AM Lima (UTC 11:00)
    - cron: '30 11 * * 1-6'   # 06:30 AM Lima (UTC 11:30)
    - cron: '0 12 * * 1-6'    # 07:00 AM Lima (UTC 12:00)
    - cron: '30 12 * * 1-6'   # 07:30 AM Lima (UTC 12:30)
    - cron: '0 13 * * 1-6'    # 08:00 AM Lima (UTC 13:00)
    - cron: '30 13 * * 1-6'   # 08:30 AM Lima (UTC 13:30)
    - cron: '0 14 * * 1-6'    # 09:00 AM Lima (UTC 14:00)
    - cron: '30 14 * * 1-6'   # 09:30 AM Lima (UTC 14:30)

    # LUNES A SÁBADO — Refuerzos de "Rescate" (Tarde)
    - cron: '0 17 * * 1-6'    # 12:00 PM Lima (UTC 17:00)
    - cron: '0 20 * * 1-6'    # 03:00 PM Lima (UTC 20:00)
    - cron: '0 23 * * 1-6'    # 06:00 PM Lima (UTC 23:00)
    
    # DOMINGO — Intentos básicos
    - cron: '0 11 * * 0'      # 06:00 AM Lima (UTC 11:00)
    - cron: '0 19 * * 0'      # 02:00 PM Lima (UTC 19:00)

  workflow_dispatch:

jobs:
  ejecutar-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: 🚀 Ejecutar el scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python scraper.py
