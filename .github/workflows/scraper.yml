name: Scraper EMMSA Diario

on:
  schedule:
    # LUNES A SÁBADO — cada 1.5 horas de 6am a 6pm Lima (UTC-5)
    - cron: '0 11 * * 1-6'    # 6:00 AM Lima
    - cron: '30 12 * * 1-6'   # 7:30 AM Lima
    - cron: '0 14 * * 1-6'    # 9:00 AM Lima
    - cron: '30 15 * * 1-6'   # 10:30 AM Lima
    - cron: '0 17 * * 1-6'    # 12:00 PM Lima
    - cron: '30 18 * * 1-6'   # 1:30 PM Lima
    - cron: '0 20 * * 1-6'    # 3:00 PM Lima
    - cron: '30 21 * * 1-6'   # 4:30 PM Lima
    - cron: '0 23 * * 1-6'    # 6:00 PM Lima
    # DOMINGO — 3 intentos
    - cron: '0 11 * * 0'      # 6:00 AM Lima
    - cron: '0 19 * * 0'      # 2:00 PM Lima
    - cron: '0 4 * * 1'       # 11:00 PM Lima del domingo (es lunes 4am UTC)
  workflow_dispatch:

jobs:
  ejecutar-scraper:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 Clonar el repositorio
      uses: actions/checkout@v4

    - name: 🐍 Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 📦 Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        playwright install chromium

    - name: 🚀 Ejecutar el scraper
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      run: python scraper.py
